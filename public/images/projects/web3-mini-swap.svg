<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <radialGradient id="swGlow" cx="80%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="swGlow2" cx="0%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="760" fill="#0a0b10"/>
  <rect width="1200" height="760" fill="url(#swGlow)"/>
  <rect width="1200" height="760" fill="url(#swGlow2)"/>

  <!-- header -->
  <text x="70" y="92" fill="#ffffff" font-size="42" font-weight="700">Mini Swap</text>
  <text x="70" y="128" fill="#8b8fa3" font-size="22">Live Uniswap V2 quotes · slippage · approve + swap</text>

  <rect x="940" y="58" width="190" height="56" rx="14" fill="#7c3aed"/>
  <text x="1035" y="93" fill="#ffffff" font-size="22" font-weight="600" text-anchor="middle">Connect</text>

  <!-- swap card -->
  <rect x="350" y="180" width="500" height="500" rx="24" fill="#13151d" stroke="#23262f" stroke-width="1.5"/>

  <!-- You pay -->
  <rect x="382" y="214" width="436" height="104" rx="16" fill="#0a0b10" stroke="#23262f" stroke-width="1.5"/>
  <text x="406" y="250" fill="#6b7080" font-size="18">You pay</text>
  <text x="406" y="296" fill="#ffffff" font-size="40" font-weight="700">1.0</text>
  <rect x="690" y="244" width="106" height="48" rx="12" fill="#1b1e27" stroke="#2c303b" stroke-width="1.5"/>
  <text x="743" y="276" fill="#ffffff" font-size="22" font-weight="600" text-anchor="middle">WETH</text>

  <!-- flip -->
  <circle cx="600" cy="338" r="26" fill="#0a0b10" stroke="#2c303b" stroke-width="1.5"/>
  <text x="600" y="347" fill="#9aa0b3" font-size="24" font-weight="700" text-anchor="middle">↓↑</text>

  <!-- You receive -->
  <rect x="382" y="358" width="436" height="104" rx="16" fill="#0a0b10" stroke="#23262f" stroke-width="1.5"/>
  <text x="406" y="394" fill="#6b7080" font-size="18">You receive</text>
  <text x="406" y="440" fill="#ffffff" font-size="40" font-weight="700">3,241.8</text>
  <rect x="690" y="388" width="106" height="48" rx="12" fill="#1b1e27" stroke="#2c303b" stroke-width="1.5"/>
  <text x="743" y="420" fill="#ffffff" font-size="22" font-weight="600" text-anchor="middle">USDC</text>

  <!-- info rows -->
  <text x="406" y="506" fill="#6b7080" font-size="20">Rate</text>
  <text x="794" y="506" fill="#cfd2dc" font-size="20" font-weight="600" text-anchor="end">1 WETH ≈ 3,241 USDC</text>

  <text x="406" y="544" fill="#6b7080" font-size="20">Max slippage</text>
  <rect x="620" y="525" width="50" height="30" rx="8" fill="#1b1e27"/>
  <text x="645" y="546" fill="#7e8398" font-size="16" text-anchor="middle">0.1%</text>
  <rect x="678" y="525" width="50" height="30" rx="8" fill="#7c3aed"/>
  <text x="703" y="546" fill="#ffffff" font-size="16" text-anchor="middle">0.5%</text>
  <rect x="736" y="525" width="58" height="30" rx="8" fill="#1b1e27"/>
  <text x="765" y="546" fill="#7e8398" font-size="16" text-anchor="middle">1.0%</text>

  <!-- swap button -->
  <rect x="382" y="588" width="436" height="68" rx="16" fill="#7c3aed"/>
  <text x="600" y="631" fill="#ffffff" font-size="26" font-weight="700" text-anchor="middle">Swap</text>
</svg>
